name: Aggregate Icons

on:
  schedule:
    - cron: "0 * * * *"   # 每小时执行
  workflow_dispatch:
  push:
    paths-ignore:
      - "Icon/**"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Prepare icon directory
        run: |
          rm -rf Icon
          mkdir -p Icon

      - name: Clone repositories
        run: |
          git clone --depth=1 https://github.com/Vbaethon/HOMOMIX.git HOMOMIX
          git clone --depth=1 https://github.com/luestr/IconResource.git IconResource

      - name: Sync icons (separate dirs)
        run: |
          rsync -av HOMOMIX/Icon/Color Icon/HOMOMIX
          rsync -av IconResource Icon/IconResource

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Icon
          git commit -m "sync: aggregate icons"
          git push
